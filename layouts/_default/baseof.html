<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  {{ partial "head.html" . }}
  <style>
    /* === Reset === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* === Base === */
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #faf9f6;
      color: #2d2d2d;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: #0078d4; text-decoration: none; transition: all 0.25s ease; }
    a:hover { color: #005a9e; }

    /* === Header === */
    .site-header {
      background: linear-gradient(135deg, #05051a 0%, #0a0a2e 30%, #0d1b2a 60%, #080820 100%);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(80,100,200,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(80,230,255,0.05) 0%, transparent 40%),
                  radial-gradient(ellipse at 50% 50%, rgba(100,80,200,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-inner { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
    .site-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
      text-decoration: none;
    }
    .site-title:hover { color: #50e6ff; }
    .site-tagline {
      margin-top: 0.5rem;
      color: rgba(255,255,255,0.6);
      font-style: normal;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.03em;
    }
    .site-nav {
      margin-top: 1.4rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .site-nav a {
      color: rgba(255,255,255,0.5);
      margin: 0 0.9rem;
      padding-bottom: 4px;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .site-nav a:hover,
    .site-nav a.active {
      color: #50e6ff;
      border-bottom: 2px solid #50e6ff;
    }

    /* === Header Canvas === */
    .header-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* === Header Logos === */
    .header-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }
    .header-logo {
      width: 32px;
      height: 32px;
      opacity: 0.9;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 6px rgba(80,230,255,0.25));
    }
    .header-logo:hover {
      opacity: 1;
      transform: scale(1.2);
      filter: drop-shadow(0 0 12px rgba(80,230,255,0.6));
    }
    .logo-sep {
      color: rgba(255,255,255,0.12);
      font-size: 0.9rem;
      font-weight: 300;
      margin: 0 0.1rem;
    }

    /* === Header Badges === */
    .header-badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.9rem;
      margin-bottom: 0.4rem;
    }
    .badge {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(80,230,255,0.25);
      color: rgba(255,255,255,0.6);
      background: rgba(80,230,255,0.06);
      transition: all 0.3s ease;
    }
    .badge:hover {
      border-color: #50e6ff;
      color: #50e6ff;
      background: rgba(80,230,255,0.12);
      box-shadow: 0 0 12px rgba(80,230,255,0.15);
    }

    /* === Main Content === */
    .content-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      min-height: 60vh;
    }

    /* === Post Card (List) === */
    .post-card {
      margin-bottom: 2.2rem;
      padding: 1.8rem;
      border: 1px solid #e8e4dc;
      border-radius: 8px;
      background: #fff;
      transition: all 0.3s ease;
      position: relative;
    }
    .post-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #0078d4, #50e6ff);
      border-radius: 8px 0 0 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .post-card:hover {
      border-color: #d0ccc4;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .post-card:hover::before { opacity: 1; }
    .post-date {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .post-card-title {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.4rem;
    }
    .post-card-title a { color: #2d2d2d; }
    .post-card-title a:hover { color: #0078d4; }
    .post-card-desc {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 0.6rem;
    }

    /* === Tags === */
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; list-style: none; }
    .tag-pill {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #f0ede6, #e8e4dc);
      border: none;
      color: #666;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .tag-pill:hover {
      background: linear-gradient(135deg, #0078d4, #50e6ff);
      color: #fff;
      transform: scale(1.05);
    }

    /* === Single Post === */
    .post-header { margin-bottom: 2rem; }
    .post-meta {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .post-meta span { margin-right: 1rem; }
    .post-title {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .post-content { text-align: justify; }
    .post-content p { margin-bottom: 1.2rem; }
    .post-content h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 2.2rem 0 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #e8e4dc;
    }
    .post-content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 1.8rem 0 0.6rem;
    }
    .post-content ul, .post-content ol {
      margin: 0 0 1.2rem 1.5rem;
    }
    .post-content li { margin-bottom: 0.3rem; }
    .post-content blockquote {
      border-left: 3px solid;
      border-image: linear-gradient(180deg, #0078d4, #50e6ff) 1;
      padding: 0.8rem 1.4rem;
      margin: 1.5rem 0;
      color: #555;
      font-style: italic;
      background: linear-gradient(135deg, #f5f3ee, #faf9f6);
      border-radius: 0 6px 6px 0;
    }
    .post-content code {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88em;
      background: #f0ede6;
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }
    .post-content pre {
      background: #2d2d2d;
      color: #e0e0e0;
      padding: 1.2rem 1.4rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .post-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1.5rem 0;
    }
    .post-content a { border-bottom: 1px solid rgba(0,120,212,0.3); }
    .post-content a:hover { border-bottom-color: #0078d4; }
    .post-content hr {
      border: none;
      border-top: 1px solid #e0dcd4;
      margin: 2rem 0;
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.92rem;
    }
    .post-content th, .post-content td {
      padding: 0.6rem 0.8rem;
      border: 1px solid #e0dcd4;
      text-align: left;
    }
    .post-content th { background: #f0ede6; font-weight: 600; }

    .post-footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e0dcd4;
    }
    .source-link {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, #0078d4, #005a9e);
      border: none;
      border-radius: 6px;
      color: #fff;
      transition: all 0.25s ease;
    }
    .source-link:hover { 
      background: linear-gradient(135deg, #50e6ff, #0078d4); 
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,120,212,0.3);
    }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      color: #999;
    }
    .back-link:hover { color: #0078d4; }

    /* === Pagination === */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e0dcd4;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.85rem;
    }
    .pagination a { color: #0078d4; }
    .pagination a:hover { color: #005a9e; }
    .pagination .disabled { color: #ccc; }

    /* === Taxonomy Pages === */
    .page-heading {
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #e0dcd4;
    }
    .page-heading span {
      color: #0078d4;
    }
    .taxonomy-list { list-style: none; }
    .taxonomy-list li {
      margin-bottom: 0.8rem;
    }
    .taxonomy-list a {
      font-size: 1.05rem;
      color: #2d2d2d;
    }
    .taxonomy-list a:hover { color: #0078d4; }
    .taxonomy-count {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #999;
      margin-left: 0.4rem;
    }

    /* === Footer === */
    .site-footer {
      text-align: center;
      padding: 2rem 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #aaa;
      border-top: 1px solid #e0dcd4;
    }
    .footer-links { margin-top: 0.4rem; }
    .footer-links a {
      color: #aaa;
      margin: 0 0.5rem;
    }
    .footer-links a:hover { color: #0078d4; }

    /* === Reading Time === */
    .reading-time { color: #bbb; }

    /* === Mermaid === */
    .mermaid { margin: 1.5rem 0; text-align: center; }

    /* === Dark Mode === */
    @media (prefers-color-scheme: dark) {
      body { background: #0f0f1a; color: #e0e0e0; }
      a { color: #50e6ff; }
      a:hover { color: #82bff0; }
      .site-header { background: linear-gradient(135deg, #080812 0%, #12122e 50%, #0a1a2a 100%); }
      .site-title { color: #fff; }
      .site-title:hover { color: #50e6ff; }
      .site-tagline { color: rgba(255,255,255,0.4); }
      .site-nav a { color: rgba(255,255,255,0.4); }
      .site-nav a:hover, .site-nav a.active { color: #50e6ff; border-bottom-color: #50e6ff; }
      .post-card { background: #1a1a2e; border-color: #2a2a3e; }
      .post-card:hover { border-color: #3a3a4e; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
      .post-card-title a { color: #e0e0e0; }
      .post-card-title a:hover { color: #50e6ff; }
      .post-card-desc { color: #aaa; }
      .tag-pill { background: linear-gradient(135deg, #2a2a3e, #1a1a2e); color: #aaa; }
      .tag-pill:hover { background: linear-gradient(135deg, #0078d4, #50e6ff); color: #fff; }
      .post-content blockquote { background: linear-gradient(135deg, #1a1a2e, #22223a); color: #ccc; }
      .post-content code { background: #2a2a3e; }
      .post-content pre { background: #080812; border: 1px solid #2a2a3e; }
      .post-content th { background: #2a2a3e; }
      .post-content th, .post-content td { border-color: #3a3a4e; }
      .post-content a { border-bottom-color: rgba(80,230,255,0.3); }
      .post-content a:hover { border-bottom-color: #50e6ff; }
      .post-content hr { border-top-color: #2a2a3e; }
      .post-footer { border-top-color: #2a2a3e; }
      .source-link { background: linear-gradient(135deg, #0078d4, #005a9e); }
      .source-link:hover { background: linear-gradient(135deg, #50e6ff, #0078d4); box-shadow: 0 4px 12px rgba(80,230,255,0.2); }
      .back-link { color: #888; }
      .back-link:hover { color: #50e6ff; }
      .pagination { border-top-color: #2a2a3e; }
      .pagination a { color: #50e6ff; }
      .pagination .disabled { color: #444; }
      .page-heading { border-bottom-color: #2a2a3e; }
      .taxonomy-list a { color: #e0e0e0; }
      .taxonomy-list a:hover { color: #50e6ff; }
      .site-footer { border-top-color: #2a2a3e; color: #555; }
      .footer-links a { color: #555; }
      .footer-links a:hover { color: #50e6ff; }
    }

    /* === Responsive === */
    @media (max-width: 600px) {
      .site-header { padding: 1.8rem 1rem 1.2rem; }
      .site-title { font-size: 1.5rem; }
      .site-tagline { font-size: 0.85rem; }
      .content-wrap { padding: 1.5rem 1rem 3rem; }
      .post-title { font-size: 1.5rem; }
      .post-card-title { font-size: 1.2rem; }
      .post-content { text-align: left; }
    }
  </style>
</head>
<body>
  {{ partial "header.html" . }}
  <main class="content-wrap">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  {{- if .HasShortcode "mermaid" }}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default'
    });
  </script>
  {{- end }}
</body>
</html>
