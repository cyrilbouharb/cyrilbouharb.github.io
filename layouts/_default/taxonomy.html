{{ define "main" }}

<h1 class="page-heading">Tagged: <span>{{ .Title }}</span></h1>

{{ range .Pages }}
<article class="post-card">
  <div class="post-date">{{ .Date.Format "January 2, 2006" }}</div>
  <h2 class="post-card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
  {{ with .Description }}<p class="post-card-desc">{{ . }}</p>{{ end }}
</article>
{{ end }}

{{ end }}
