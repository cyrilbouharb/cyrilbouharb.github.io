    </div>
    <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
    <p class="site-tagline">{{ .Site.Params.description }}</p>
    <div class="header-badges">
      <span class="badge">Microsoft Foundry</span>
      <span class="badge">Azure AI</span>
      <span class="badge">Copilot</span>
      <span class="badge">Architecture</span>
    </div>
    <nav class="site-nav">
      <a href="{{ .Site.BaseURL }}" {{ if .IsHome }}class="active"{{ end }}>Home</a>
      <a href="{{ .Site.BaseURL }}about/" {{ if eq .RelPermalink "/about/" }}class="active"{{ end }}>About</a>
      <a href="{{ .Site.BaseURL }}tags/" {{ if eq .Section "tags" }}class="active"{{ end }}>Tags</a>
    </nav>
  </div>
</header>
<script>
(function() {
  const c = document.getElementById('header-particles');
  if (!c) return;
  const ctx = c.getContext('2d');
  let w, h, stars = [], shootingStars = [];
  function resize() {
    const header = c.parentElement;
    w = c.width = header.offsetWidth;
    h = c.height = header.offsetHeight;
  }
  function init() {
    resize();
    stars = [];
    // Static twinkling stars
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.2 + 0.3,
        baseO: Math.random() * 0.6 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinklePhase: Math.random() * Math.PI * 2,
        color: ['255,255,255', '200,220,255', '180,200,255', '255,240,220'][Math.floor(Math.random()*4)]
      });
    }
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    frame++;

    // Draw stars with twinkling
    stars.forEach(s => {
      const o = s.baseO + Math.sin(frame * s.twinkleSpeed + s.twinklePhase) * 0.25;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color}, ${Math.max(0.05, o)})`;
      ctx.fill();
      // Glow for brighter stars
      if (s.r > 1) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.color}, ${o * 0.08})`;
        ctx.fill();
      }
    });

    // Occasional shooting star
    if (Math.random() < 0.005) {
      shootingStars.push({
        x: Math.random() * w, y: Math.random() * h * 0.4,
        vx: (Math.random() * 3 + 2) * (Math.random() > 0.5 ? 1 : -1),
        vy: Math.random() * 1.5 + 0.5,
        life: 1, decay: Math.random() * 0.015 + 0.01,
        len: Math.random() * 40 + 20
      });
    }
    shootingStars = shootingStars.filter(ss => {
      ss.x += ss.vx; ss.y += ss.vy; ss.life -= ss.decay;
      if (ss.life <= 0) return false;
      const grad = ctx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * ss.len * 0.3, ss.y - ss.vy * ss.len * 0.3);
      grad.addColorStop(0, `rgba(180,220,255,${ss.life * 0.8})`);
      grad.addColorStop(1, 'rgba(180,220,255,0)');
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - ss.vx * ss.len * 0.3, ss.y - ss.vy * ss.len * 0.3);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.2;
      ctx.stroke();
      return true;
    });

    // Subtle nebula glow
    const nebula = ctx.createRadialGradient(w*0.3, h*0.5, 0, w*0.3, h*0.5, w*0.4);
    nebula.addColorStop(0, 'rgba(80,100,200,0.03)');
    nebula.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nebula;
    ctx.fillRect(0,0,w,h);

    const nebula2 = ctx.createRadialGradient(w*0.75, h*0.3, 0, w*0.75, h*0.3, w*0.3);
    nebula2.addColorStop(0, 'rgba(80,230,255,0.02)');
    nebula2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nebula2;
    ctx.fillRect(0,0,w,h);

    requestAnimationFrame(draw);
  }
  init();
  draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
